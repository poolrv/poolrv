name: Generate Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics SVG (dark theme)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: poolrv
          filename: assets/github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: America/Bogota
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          extras_css: |
            body { background: #0d1117 !important; }
            .background { fill: #0d1117 !important; }
            svg { background: #0d1117 !important; }
            h2, .title, a { color: #58a6ff !important; fill: #58a6ff !important; }
            .field, .value, .text, p, span, tspan, td, th, li, small, .row, .cell, .name, .data, strong, time { color: #c9d1d9 !important; fill: #c9d1d9 !important; }
