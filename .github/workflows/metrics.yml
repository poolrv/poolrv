name: Generate Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metrics SVG (light text)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: poolrv
          filename: assets/github-metrics.svg
          output_action: none
          base: header, activity, community, repositories, metadata
          config_timezone: America/Bogota
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          extras_css: |
            text, tspan { fill: #c9d1d9 !important; }
            * { color: #c9d1d9 !important; }
            a, h1, h2, h3 { color: #58a6ff !important; }

      - name: Inject solid dark background and commit
        run: |
          sed -i 's|\(<svg[^>]*>\)|\1<rect width="100%" height="100%" fill="#0d1117"/>|' assets/github-metrics.svg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-metrics.svg
          git commit -m "chore: regenerate dark metrics [skip ci]" || echo "no changes"
          git push
